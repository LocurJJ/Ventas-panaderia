<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f4f6fb;
    }

    .app{
      display:flex;
      height:100vh;
    }

    .sidebar{
      width:220px;
      background:white;
      border-right:1px solid #ddd;
      padding:20px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#2563eb;
      margin-bottom:30px;
    }

    .menu button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:10px;
      cursor:pointer;
      text-align:left;
      background:#f3f4f6;
      font-size:16px;
    }

    .menu button.active{
      background:#2563eb;
      color:white;
    }

    .content{
      flex:1;
      padding:20px;
      display:flex;
      gap:20px;
    }

    .cart{
      width:420px;
      background:white;
      border-radius:20px;
      padding:20px;
      display:flex;
      flex-direction:column;
    }

    .products{
      flex:1;
      background:white;
      border-radius:20px;
      padding:20px;
    }

    .search{
      width:100%;
      padding:15px;
      border-radius:12px;
      border:1px solid #ddd;
      margin-bottom:20px;
      font-size:16px;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
    }

    .product{
      background:#2563eb;
      color:white;
      padding:20px;
      border-radius:15px;
      cursor:pointer;
    }

    .product small{
      display:block;
      margin-top:10px;
    }

   .cart-table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

.cart-table th{
  text-align:left;
  font-size:13px;
  color:#6b7280;
  padding-bottom:10px;
}

.cart-table td{
  padding:10px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.price-edit{
  width:90px;
  padding:6px;
  border:1px solid #ddd;
  border-radius:8px;
}

    .total{
      margin-top:auto;
      padding-top:20px;
    }

    .total h2{
      margin-bottom:20px;
    }

    .pay-btn{
      width:100%;
      background:#2563eb;
      color:white;
      border:none;
      padding:18px;
      border-radius:15px;
      font-size:18px;
      cursor:pointer;
    }

  </style>
</head>
<body>

<div class="app">

  <aside class="sidebar">

    <div class="logo">
      Josué
    </div>

    <div class="menu">
      <button class="active">⚡ Vender</button>
      <button>🕒 Turnos</button>
      <button>📦 Productos</button>
      <button>📒 Cuaderno</button>
      <button>📊 Reportes</button>
      <button>👤 Clientes</button>
    </div>

  </aside>

  <main class="content">

    <section class="cart">

      <h2>Venta</h2>

      <table class="cart-table">
  <thead>
    <tr>
      <th>Producto</th>
      <th>Cant.</th>
      <th>Precio</th>
    </tr>
  </thead>
  <tbody id="cartItems"></tbody>
</table>

      <div class="total">
        <h2 id="total">
          Total: $0
        </h2>

        <button class="pay-btn">
          Cobrar
        </button>
      </div>

    </section>

    <section class="products">

      <input
        type="text"
        class="search"
        placeholder="Buscar producto..."
      >

      <div class="product-grid">

        <div class="product" onclick="addProduct('Pan',2800)">
          Pan
          <small>$2800/kg</small>
        </div>

        <div class="product" onclick="addProduct('Leche',1600)">
          Leche
          <small>$1600</small>
        </div>

        <div class="product" onclick="addProduct('Facturas',500)">
          Facturas
          <small>$500</small>
        </div>

      </div>

    </section>

  </main>

</div>

<script>

let cart = [];

function addProduct(name, price){

  let existing = cart.find(item => item.name === name);

  if(existing){
    existing.quantity += 1;
    existing.total = existing.quantity * existing.price;
  }else{
    cart.push({
      name: name,
      quantity: 1,
      price: price,
      total: price
    });
  }

  renderCart();
}

function renderCart(){

  let container = document.getElementById("cartItems");

  container.innerHTML = "";

  let total = 0;

  cart.forEach((product, index) => {

    total += product.total;

    container.innerHTML += `
      <tr>
        <td>${product.name}</td>
        <td>${product.quantity}</td>
        <td>
          <input
            class="price-edit"
            type="number"
            value="${product.total}"
            onchange="changePrice(${index}, this.value)"
          >
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText =
    "Total: $" + total;
}

function changePrice(index, newPrice){
  cart[index].total = Number(newPrice);
  renderCart();
}

</script>

</body>
</html>
