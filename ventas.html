<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f4f6fb;
    }

    .app{
      display:flex;
      height:100vh;
    }

    .sidebar{
      width:220px;
      background:white;
      border-right:1px solid #ddd;
      padding:20px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#2563eb;
      margin-bottom:30px;
    }

    .menu button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:10px;
      cursor:pointer;
      text-align:left;
      background:#f3f4f6;
      font-size:16px;
    }

    .menu button.active{
      background:#2563eb;
      color:white;
    }

    .content{
      flex:1;
      padding:20px;
      display:flex;
      gap:20px;
    }

    .cart{
      width:420px;
      background:white;
      border-radius:20px;
      padding:20px;
      display:flex;
      flex-direction:column;
    }

    .products{
      flex:1;
      background:white;
      border-radius:20px;
      padding:20px;
    }

    .search{
      width:100%;
      padding:15px;
      border-radius:12px;
      border:1px solid #ddd;
      margin-bottom:20px;
      font-size:16px;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
    }

    .product{
      background:#2563eb;
      color:white;
      padding:20px;
      border-radius:15px;
      cursor:pointer;
    }

    .product small{
      display:block;
      margin-top:10px;
    }

    .cart-item{
      padding:15px 0;
      border-bottom:1px solid #eee;
    }

    .total{
      margin-top:auto;
      padding-top:20px;
    }

    .total h2{
      margin-bottom:20px;
    }

    .pay-btn{
      width:100%;
      background:#2563eb;
      color:white;
      border:none;
      padding:18px;
      border-radius:15px;
      font-size:18px;
      cursor:pointer;
    }

  </style>
</head>
<body>

<div class="app">

  <aside class="sidebar">

    <div class="logo">
      Josué
    </div>

    <div class="menu">
      <button class="active">⚡ Vender</button>
      <button>🕒 Turnos</button>
      <button>📦 Productos</button>
      <button>📒 Cuaderno</button>
      <button>📊 Reportes</button>
      <button>👤 Clientes</button>
    </div>

  </aside>

  <main class="content">

    <section class="cart">

      <h2>Venta</h2>

      <div id="cartItems">

      </div>

      <div class="total">
        <h2 id="total">
          Total: $0
        </h2>

        <button class="pay-btn">
          Cobrar
        </button>
      </div>

    </section>

    <section class="products">

      <input
        type="text"
        class="search"
        placeholder="Buscar producto..."
      >

      <div class="product-grid">

        <div class="product" onclick="addProduct('Pan',2800)">
          Pan
          <small>$2800/kg</small>
        </div>

        <div class="product" onclick="addProduct('Leche',1600)">
          Leche
          <small>$1600</small>
        </div>

        <div class="product" onclick="addProduct('Facturas',500)">
          Facturas
          <small>$500</small>
        </div>

      </div>

    </section>

  </main>

</div>

<script>

let cart = [];

function addProduct(name,price){

  cart.push({
    name,
    price
  });

  renderCart();
}

function renderCart(){

  let container = document.getElementById("cartItems");

  container.innerHTML = "";

  let total = 0;

  cart.forEach(product=>{

    total += product.price;

    container.innerHTML += `
      <div class="cart-item">
        ${product.name} - $${product.price}
      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Total: $" + total;
}

</script>

</body>
</html>
